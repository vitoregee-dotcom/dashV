<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="apple-mobile-web-app-title" content="PartsFlow">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1F4E79">
<title>PartsFlow — Ajuste de Saldo</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns=&#39;http://www.w3.org/2000/svg&#39; viewBox=&#39;0 0 40 40&#39;%3E%3Crect width=&#39;40&#39; height=&#39;40&#39; rx=&#39;10&#39; fill=&#39;%230F1F35&#39;/%3E%3Crect x=&#39;9&#39; y=&#39;8&#39; width=&#39;4&#39; height=&#39;22&#39; rx=&#39;1.5&#39; fill=&#39;%23fff&#39;/%3E%3Cpath d=&#39;M13,8 Q26,8 26,14 Q26,20 13,20&#39; fill=&#39;none&#39; stroke=&#39;%23fff&#39; stroke-width=&#39;4&#39; stroke-linecap=&#39;round&#39; stroke-linejoin=&#39;round&#39;/%3E%3Cline x1=&#39;19&#39; y1=&#39;20&#39; x2=&#39;29&#39; y2=&#39;32&#39; stroke=&#39;%23E67E22&#39; stroke-width=&#39;2.5&#39; stroke-linecap=&#39;round&#39;/%3E%3Ccircle cx=&#39;30&#39; cy=&#39;33&#39; r=&#39;2&#39; fill=&#39;%23E67E22&#39;/%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns=&#39;http://www.w3.org/2000/svg&#39; viewBox=&#39;0 0 40 40&#39;%3E%3Crect width=&#39;40&#39; height=&#39;40&#39; rx=&#39;10&#39; fill=&#39;%230F1F35&#39;/%3E%3Crect x=&#39;9&#39; y=&#39;8&#39; width=&#39;4&#39; height=&#39;22&#39; rx=&#39;1.5&#39; fill=&#39;%23fff&#39;/%3E%3Cpath d=&#39;M13,8 Q26,8 26,14 Q26,20 13,20&#39; fill=&#39;none&#39; stroke=&#39;%23fff&#39; stroke-width=&#39;4&#39; stroke-linecap=&#39;round&#39; stroke-linejoin=&#39;round&#39;/%3E%3Cline x1=&#39;19&#39; y1=&#39;20&#39; x2=&#39;29&#39; y2=&#39;32&#39; stroke=&#39;%23E67E22&#39; stroke-width=&#39;2.5&#39; stroke-linecap=&#39;round&#39;/%3E%3Ccircle cx=&#39;30&#39; cy=&#39;33&#39; r=&#39;2&#39; fill=&#39;%23E67E22&#39;/%3E%3C/svg%3E">
<style>
  *{box-sizing:border-box}
  body{margin:0;font-family:Calibri,Arial,sans-serif;background:#F9FAFC;color:#1a2332;-webkit-text-size-adjust:100%}
  .wrap{max-width:440px;margin:0 auto;padding:28px 20px}
  .logo{font-size:38px;text-align:center;margin-bottom:4px}
  h1{margin:0 0 4px;font-size:20px;text-align:center;color:#1F4E79}
  .sub{color:#607080;font-size:13px;text-align:center;margin-bottom:22px}
  label{font-size:11px;font-weight:700;color:#607080;text-transform:uppercase;display:block;margin:14px 0 6px}
  input{width:100%;padding:12px 14px;border:1.5px solid #e0e8f0;border-radius:10px;font-size:16px}
  .btn{width:100%;background:#1F4E79;color:#fff;border:none;border-radius:12px;padding:15px;cursor:pointer;font-size:16px;font-weight:700;margin-top:20px}
  .status{margin-top:14px;text-align:center;font-size:14px;min-height:20px}
  .card{background:#fff;border:1.5px solid #e8edf4;border-radius:14px;padding:22px}
</style>
</head>
<body>
<div class="wrap">
  <img src="logo-triex.png" alt="Triex" style="display:block;max-width:180px;margin:0 auto 6px">
  <div style="text-align:center;font-weight:700;font-size:11px;color:#8a9ab0;letter-spacing:1px;margin-bottom:18px">PARTSFLOW</div>
  <div class="logo">⚠️📦</div>
  <h1>Ajuste de Saldo</h1>
  <div class="sub">Contou o físico e tá diferente do sistema? Preenche e manda o aviso.</div>
  <div class="card">
    <label>Código do item</label>
    <input type="text" id="ref" placeholder="Referência" autocapitalize="characters">
    <label>Código da Marca</label>
    <input type="text" id="marca" placeholder="Código da Marca" autocapitalize="characters">
    <label>Saldo no sistema (se souber)</label>
    <input type="number" id="saldoSistema" placeholder="Opcional">
    <label>Saldo contado no físico</label>
    <input type="number" id="saldoFisico" placeholder="O que você contou de verdade">
    <button class="btn" onclick="enviar()">📩 Enviar aviso</button>
    <div class="status" id="status"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<script>emailjs.init('QXenSbRgKUsnpVjb_');</script>
<script>
// v1 - Pagina leve e separada pra Ajuste de Saldo, igual a foto.html: sem
// login, sem carregar o app inteiro. So preenche e manda -- o e-mail
// (EmailJS) roda direto no navegador, sem precisar de sessao nenhuma.
function passo(txt,cor){
  var el=document.getElementById('status');
  if(el)el.innerHTML='<span style="color:'+(cor||'#8a9ab0')+'">'+txt+'</span>';
}

function saudacaoHorario(){
  var h=new Date().getHours();
  if(h<12)return 'Bom dia';
  if(h<18)return 'Boa tarde';
  return 'Boa noite';
}

async function enviar(){
  var ref=(document.getElementById('ref').value||'').trim().toUpperCase();
  var marca=(document.getElementById('marca').value||'').trim().toUpperCase();
  var saldoSistema=document.getElementById('saldoSistema').value;
  var saldoFisico=document.getElementById('saldoFisico').value;
  if(!ref){passo('Preenche o código do item.','#C00000');return;}
  if(saldoFisico===''||saldoFisico==null){passo('Preenche o saldo contado no físico.','#C00000');return;}
  passo('Enviando...');
  try{
    var diferenca=(parseFloat(saldoFisico)||0)-(parseFloat(saldoSistema)||0);
    await emailjs.send('service_2lp37gt','template_leyiqf4',{
      to_email:'vitoregee@gmail.com',
      ref:ref,
      marca:marca||'—',
      obs:'⚠️ FURO DE ESTOQUE\n\n'
        +saudacaoHorario()+', Vitor,\n\n'
        +'O Estoque identificou um furo de estoque no item abaixo -- o saldo contado no físico não bate com o saldo do sistema. Favor verificar.\n\n'
        +'Código: '+ref+'\n'
        +'Código da Marca: '+(marca||'—')+'\n'
        +'Saldo no sistema: '+(saldoSistema||'não informado')+'\n'
        +'Saldo no físico: '+saldoFisico+'\n'
        +(saldoSistema?'Diferença: '+(diferenca>0?'+':'')+diferenca+'\n':'')
        +'\nInformado pelo Estoque em '+new Date().toLocaleString('pt-BR')+'.',
      cod_cliente:'—',nome_cliente:'—',subject:'⚠️ Furo de Estoque - '+ref
    });
    passo('✅ Aviso enviado! Obrigado.','#2A6A28');
    document.getElementById('ref').value='';
    document.getElementById('marca').value='';
    document.getElementById('saldoSistema').value='';
    document.getElementById('saldoFisico').value='';
  }catch(e){
    passo('Erro ao enviar: '+e.message,'#C00000');
  }
}
</script>
</body>
</html>
