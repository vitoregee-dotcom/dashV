<html lang="pt-BR">
<head>

<title>PartsFlow — Foto do item</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns=&#39;http://www.w3.org/2000/svg&#39; viewBox=&#39;0 0 40 40&#39;%3E%3Crect width=&#39;40&#39; height=&#39;40&#39; rx=&#39;10&#39; fill=&#39;%230F1F35&#39;/%3E%3Crect x=&#39;9&#39; y=&#39;8&#39; width=&#39;4&#39; height=&#39;22&#39; rx=&#39;1.5&#39; fill=&#39;%23fff&#39;/%3E%3Cpath d=&#39;M13,8 Q26,8 26,14 Q26,20 13,20&#39; fill=&#39;none&#39; stroke=&#39;%23fff&#39; stroke-width=&#39;4&#39; stroke-linecap=&#39;round&#39; stroke-linejoin=&#39;round&#39;/%3E%3Cline x1=&#39;19&#39; y1=&#39;20&#39; x2=&#39;29&#39; y2=&#39;32&#39; stroke=&#39;%23E67E22&#39; stroke-width=&#39;2.5&#39; stroke-linecap=&#39;round&#39;/%3E%3Ccircle cx=&#39;30&#39; cy=&#39;33&#39; r=&#39;2&#39; fill=&#39;%23E67E22&#39;/%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns=&#39;http://www.w3.org/2000/svg&#39; viewBox=&#39;0 0 40 40&#39;%3E%3Crect width=&#39;40&#39; height=&#39;40&#39; rx=&#39;10&#39; fill=&#39;%230F1F35&#39;/%3E%3Crect x=&#39;9&#39; y=&#39;8&#39; width=&#39;4&#39; height=&#39;22&#39; rx=&#39;1.5&#39; fill=&#39;%23fff&#39;/%3E%3Cpath d=&#39;M13,8 Q26,8 26,14 Q26,20 13,20&#39; fill=&#39;none&#39; stroke=&#39;%23fff&#39; stroke-width=&#39;4&#39; stroke-linecap=&#39;round&#39; stroke-linejoin=&#39;round&#39;/%3E%3Cline x1=&#39;19&#39; y1=&#39;20&#39; x2=&#39;29&#39; y2=&#39;32&#39; stroke=&#39;%23E67E22&#39; stroke-width=&#39;2.5&#39; stroke-linecap=&#39;round&#39;/%3E%3Ccircle cx=&#39;30&#39; cy=&#39;33&#39; r=&#39;2&#39; fill=&#39;%23E67E22&#39;/%3E%3C/svg%3E">
<style>
  *{box-sizing:border-box}
  body{margin:0;font-family:Calibri,Arial,sans-serif;background:#F9FAFC;color:#1a2332;-webkit-text-size-adjust:100%}
  .wrap{max-width:480px;margin:0 auto;padding:28px 20px;text-align:center;min-height:100vh}
  .logo{font-size:38px;margin-bottom:6px}
  h1{margin:0 0 4px;font-size:20px;color:#1a2332}
  .marca{color:#607080;font-weight:400}
  .desc{color:#607080;font-size:13px;margin-bottom:6px}
  .loc{display:inline-block;background:#EEF2F7;color:#1F4E79;font-size:13px;font-weight:700;padding:5px 14px;border-radius:20px;margin-bottom:8px}
  .obs{background:#FFF3E8;color:#B8790A;font-size:12px;padding:8px 12px;border-radius:8px;margin:10px 0}
  .status{margin:16px 0;min-height:20px;font-size:13px}
  .btn-cam,.btn-gal{display:flex;align-items:center;justify-content:center;gap:8px;border-radius:14px;padding:18px 24px;cursor:pointer;font-size:15px;font-weight:700;position:relative;overflow:hidden;width:100%;box-sizing:border-box;margin-bottom:10px}
  .btn-cam{background:#C2410C;color:#fff;border:none}
  .btn-gal{background:#fff;color:#C2410C;border:2px solid #C2410C}
  .btn-cam input,.btn-gal input{position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:pointer}
  .fotos{display:flex;gap:8px;justify-content:center;margin-bottom:16px;flex-wrap:wrap}
  .fotos img{width:76px;height:76px;object-fit:cover;border-radius:8px;border:1.5px solid #e0e8f0}
  .rodape{margin-top:24px;color:#c0c8d0;font-size:10px}
  .erro{color:#C00000}
  .loading{color:#8a9ab0;padding:60px 0}
</style>
</head>
<body>
<div class="wrap" id="app">
  <div class="loading">🔎 Carregando...</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<script>emailjs.init('bIFMVDWjGYHhlPLrL');</script>
<script>
// v1 - Página leve e separada da Solicitação de Fotos. Criada porque a
// versão anterior (dentro do app inteiro, index.html) travava no Safari do
// iPhone: o app inteiro tem o catálogo de produtos carregado (megabytes),
// e ao abrir a câmera/galeria o iOS às vezes descarrega a aba pra liberar
// memória, perdendo a foto no meio do caminho. Essa página só toca numa
// tabela pequena e dedicada (fotos_solicitacoes) -- nunca carrega nem
// escreve no catálogo grande. O anexo ao Cadastro de Produtos acontece
// depois, automaticamente, da próxima vez que alguém abrir o PartsFlow
// normal (ver sfProcessarPendentes no index.html).
var SB_URL="https://bqbdypizmeirezedvefo.supabase.co";
var SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJxYmR5cGl6bWVpcmV6ZWR2ZWZvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyMDYzODQsImV4cCI6MjA5Mzc4MjM4NH0.U1Mp34FxsHobn8LGxSCkbSQtHiU4O8TyaARDuNn1IU8";

function esc(s){return (s||'').toString().replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}

async function sbFetch(path,opts){
  opts=opts||{};
  opts.headers=Object.assign({'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'},opts.headers||{});
  return fetch(SB_URL+path,opts);
}

function resizeImagem(file,maxDim,qualidade){
  return new Promise(function(resolve,reject){
    var reader=new FileReader();
    reader.onload=function(e){
      var img=new Image();
      img.onload=function(){
        var w=img.width,h=img.height;
        if(w>h&&w>maxDim){h=Math.round(h*maxDim/w);w=maxDim;}
        else if(h>maxDim){w=Math.round(w*maxDim/h);h=maxDim;}
        var canvas=document.createElement('canvas');
        canvas.width=w;canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        resolve(canvas.toDataURL('image/jpeg',qualidade||0.72));
      };
      img.onerror=function(){reject(new Error('Não consegui ler essa imagem.'));};
      img.src=e.target.result;
    };
    reader.onerror=function(){reject(new Error('Não consegui ler o arquivo.'));};
    reader.readAsDataURL(file);
  });
}

async function carregarSolicitacao(idAlvo){
  app.innerHTML='<div class="loading">🔎 Carregando...</div>';
  try{
    var r=await sbFetch('/rest/v1/fotos_solicitacoes?id=eq.'+encodeURIComponent(idAlvo)+'&select=*');
    if(!r.ok)throw new Error('HTTP '+r.status);
    var rows=await r.json();
    if(!rows||!rows[0]){
      app.innerHTML='<div class="erro" style="padding:40px">Solicitação não encontrada (pode já ter sido excluída).</div>';
      return;
    }
    id=idAlvo;
    render(rows[0]);
  }catch(e){
    app.innerHTML='<div class="erro" style="padding:40px">Não consegui carregar a solicitação: '+esc(e.message)+'<br><br><button onclick="location.reload()" style="padding:8px 16px;border-radius:8px;border:1px solid #ccc;background:#fff;cursor:pointer">Tentar de novo</button></div>';
  }
}

// v115.776 - Tela de lista (quando o link é aberto SEM ?id=...) pra dar pra
// imprimir um único QR fixo e colar no estoque -- igual já existia pro
// Ajuste de Saldo. Antes cada solicitação de foto só tinha link individual
// (gerado na hora, mandado por WhatsApp/e-mail), sem opção de um QR único
// reaproveitável. Mostra as solicitações ainda pendentes (sem foto) pra
// quem está no estoque escolher qual fotografar.
async function mostrarListaPendentes(){
  app.innerHTML='<div class="loading">🔎 Carregando solicitações pendentes...</div>';
  try{
    var r=await sbFetch('/rest/v1/fotos_solicitacoes?status=eq.pendente&select=*&order=criado_em.asc');
    if(!r.ok)throw new Error('HTTP '+r.status);
    var rows=await r.json();
    var listaHtml=(!rows||!rows.length)
      ? '<div style="color:#8a9ab0;padding:30px 0;font-size:14px">✅ Nenhuma solicitação pendente no momento.</div>'
      : rows.map(function(s){
          return '<div onclick="carregarSolicitacao(\''+esc(s.id)+'\')" style="text-align:left;background:#fff;border:1.5px solid #F0D9C0;border-radius:10px;padding:12px 14px;margin-bottom:8px;cursor:pointer">'
            +'<div style="font-weight:700;color:#1a2332;font-size:14px">'+esc(s.ref)+(s.marca?' <span style="color:#607080;font-weight:400">('+esc(s.marca)+')</span>':'')+'</div>'
            +(s.descricao?'<div style="color:#607080;font-size:12px;margin-top:2px">'+esc(s.descricao)+'</div>':'')
            +(s.locacao?'<div style="display:inline-block;background:#EEF2F7;color:#1F4E79;font-size:11px;font-weight:700;padding:2px 10px;border-radius:12px;margin-top:6px">📍 '+esc(s.locacao)+'</div>':'')
            +'</div>';
        }).join('');
    app.innerHTML=
      '<img src="logo-triex.png" alt="Triex" style="display:block;max-width:150px;margin:0 auto 4px">'
      +'<div style="text-align:center;font-weight:700;font-size:10px;color:#8a9ab0;letter-spacing:1px;margin-bottom:14px">PARTSFLOW</div>'
      +'<div class="logo">📷</div>'
      +'<h1 style="font-size:17px">Solicitações de foto pendentes</h1>'
      +'<div class="desc" style="margin-bottom:14px">Toque num item pra fotografar</div>'
      +'<div style="text-align:left">'+listaHtml+'</div>'
      +'<div class="rodape">PartsFlow · Solicitação de Fotos</div>';
  }catch(e){
    app.innerHTML='<div class="erro" style="padding:40px">Não consegui carregar as solicitações: '+esc(e.message)+'<br><br><button onclick="location.reload()" style="padding:8px 16px;border-radius:8px;border:1px solid #ccc;background:#fff;cursor:pointer">Tentar de novo</button></div>';
  }
}

var params=new URLSearchParams(location.search);
var id=params.get('id')||params.get('fotoReq');
var app=document.getElementById('app');

function render(s){
  var fotos=s.fotos||[];
  app.innerHTML=
    '<img src="logo-triex.png" alt="Triex" style="display:block;max-width:150px;margin:0 auto 4px">'+
    '<div style="text-align:center;font-weight:700;font-size:10px;color:#8a9ab0;letter-spacing:1px;margin-bottom:14px">PARTSFLOW</div>'+
    '<div class="logo">📷</div>'+
    '<h1>'+esc(s.ref)+(s.marca?' <span class="marca">('+esc(s.marca)+')</span>':'')+'</h1>'+
    (s.descricao?'<div class="desc">'+esc(s.descricao)+'</div>':'')+
    (s.solicitante_nome?'<div class="desc">Solicitado por: <strong>'+esc(s.solicitante_nome)+'</strong></div>':'')+
    (s.locacao?'<div class="loc">📍 '+esc(s.locacao)+'</div>':'')+
    (s.obs?'<div class="obs">'+esc(s.obs)+'</div>':'')+
    '<div class="status" id="status"></div>'+
    (fotos.length?'<div style="color:#2A6A28;font-weight:700;font-size:13px;margin-bottom:8px">✅ '+fotos.length+' foto'+(fotos.length>1?'s enviadas':' enviada')+'</div>':'')+
    '<div class="fotos">'+fotos.map(function(f){return '<img src="'+f+'">';}).join('')+'</div>'+
    '<label class="btn-cam">📷 Adicionar foto<input type="file" accept="image/*" multiple id="inCam"></label>'+
    '<div style="margin-top:6px"><a href="foto.html" style="color:#8a9ab0;font-size:12px;text-decoration:none">← Ver outras solicitações pendentes</a></div>'+
    '<div class="rodape">PartsFlow · Solicitação de Fotos</div>';
  document.getElementById('inCam').addEventListener('change',function(){enviar(this,s);});
}

function passo(txt,cor){
  var el=document.getElementById('status');
  if(el)el.innerHTML='<span style="color:'+(cor||'#8a9ab0')+'">'+esc(txt)+'</span>';
}

async function enviar(input,s){
  var files=Array.from(input.files||[]);
  if(!files.length)return;
  passo('1/4 · Recebido '+files.length+' arquivo(s)...');
  try{
    var fotosNovas=[];
    for(var i=0;i<files.length;i++){
      passo('2/4 · Processando foto '+(i+1)+' de '+files.length+'...');
      var b64=await resizeImagem(files[i],1280,0.72);
      fotosNovas.push(b64);
    }
    passo('3/4 · Enviando pro servidor...');
    var fotosFinal=(s.fotos||[]).concat(fotosNovas);
    var r=await sbFetch('/rest/v1/fotos_solicitacoes?id=eq.'+encodeURIComponent(id),{
      method:'PATCH',
      headers:{'Prefer':'return=representation'},
      body:JSON.stringify({
        fotos:fotosFinal,
        status:'atendida',
        atendido_por:(localStorage.getItem('sf_nome_atendente')||'').trim()||'Estoque',
        atendido_em:new Date().toISOString(),
        processado:false
      })
    });
    if(!r.ok){throw new Error('Servidor recusou salvar (HTTP '+r.status+').');}
    var atualizado=await r.json();
    s=atualizado&&atualizado[0]?atualizado[0]:s;
    passo('4/4 · ✅ Enviado! Obrigado.','#2A6A28');
    // Avisa por email quem solicitou a foto, com data/hora de quando foi atendida
    try{
      if(s.solicitante_email){
        var dataHora=new Date(s.atendido_em).toLocaleString('pt-BR',{dateStyle:'short',timeStyle:'short'});
        await emailjs.send('service_2lp37gt','template_8r5j0sq',{
          to_email:s.solicitante_email,
          ref:s.ref,
          marca:s.marca||'—',
          obs:'📷 Foto recebida em '+dataHora+' (por '+(s.atendido_por||'Estoque')+'). Total de '+(s.fotos||[]).length+' foto(s) já anexada(s) ao cadastro do produto.',
          cod_cliente:'—',nome_cliente:'—'
        });
      }
    }catch(eMail){console.warn('Não consegui notificar por email:',eMail);}
    setTimeout(function(){render(s);},600);
  }catch(e){
    passo('❌ Erro: '+e.message+' — tenta de novo.','#C00000');
  }
}

(async function(){
  if(!id){
    mostrarListaPendentes();
    return;
  }
  await carregarSolicitacao(id);
})();
</script>
</body>
</html>
