<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Touch Test</title>
</head>
<body>
<div id="sidebar" style="width:200px;height:100vh;background:#1F4E79;position:fixed;left:0;top:0;display:flex;flex-direction:column;justify-content:flex-end;padding:12px;box-sizing:border-box;overflow-y:auto;-webkit-overflow-scrolling:touch">
  <div id="log" style="color:white;font-size:11px;margin-bottom:10px;min-height:60px"></div>
  <button id="btnSair" style="width:100%;padding:10px;border:1px solid red;background:none;color:red;border-radius:8px;font-size:14px;touch-action:manipulation">Sair / Resetar</button>
  <div style="height:8px"></div>
  <button id="btnAdmin" style="width:100%;padding:10px;background:#7B2D8B;color:white;border:none;border-radius:8px;font-size:14px;touch-action:manipulation">⚙ Usuários</button>
</div>
<script>
var log = document.getElementById('log');
function addLog(msg){ log.innerHTML = msg + '<br>' + log.innerHTML; }

var btnSair = document.getElementById('btnSair');
var btnAdmin = document.getElementById('btnAdmin');

['click','touchstart','touchend','pointerdown','pointerup'].forEach(function(ev){
  btnSair.addEventListener(ev, function(e){ addLog('SAIR: '+ev); e.preventDefault(); }, {passive:false});
  btnAdmin.addEventListener(ev, function(e){ addLog('ADMIN: '+ev); e.preventDefault(); }, {passive:false});
});
</script>
</body>
</html>
